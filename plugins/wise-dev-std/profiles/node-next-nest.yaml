id: node-next-nest
title: "Node (Next.js + NestJS)"
status: stable
summary: >
  React 기반 풀스택. 프론트 Next.js(App Router), 백엔드 NestJS. 프론트-백엔드 언어 공유.
when_to_use:
  - "프론트-백엔드 언어를 TypeScript 로 통일하고 싶을 때"
  - "BFF / API Gateway 가 필요할 때"
  - "여러 팀이 협업하는 엔터프라이즈 API (DI/모듈화 필요)"
avoid_when:
  - "수치/ML/통계 연산이 핵심일 때 → python-fastapi"
  - "초고동시성·저지연 코어 → go-gin 또는 rust-axum"

languages:
  primary: node
  also: [typescript]

package_managers:
  default: pnpm
  allowed: [pnpm, npm]
  notes: "monorepo 는 pnpm workspaces 권장. yarn/bun 은 승인제. forever 금지(레거시), 프로세스 관리는 PM2(베어메탈) 또는 K8s(컨테이너)."

layers:
  frontend:
    framework: "Next.js (App Router)"
    ui: "React + TypeScript + Tailwind CSS"
    state: "Redux Toolkit (대형) / Zustand (소형)"
    test: "Vitest + Playwright"
    docs: "Storybook"
  backend:
    framework: "NestJS"
    orm: "Prisma"
    rpc: "gRPC (optional)"
  database:
    default: postgres
    local: sqlite
    cache: redis
  ops:
    ci: "GitHub Actions (or GitLab CI)"
    container: "Docker + Docker Compose"
    deploy: "Kubernetes + Helm + Argo CD"
    quality: "SonarQube + Sentry"
  app: null

run_methods:
  direct:
    dev: "pnpm dev"
    start: "pnpm start"
    local_pm: "PM2 (ecosystem.config.cjs) — make run/stop/restart/logs/ps. 베어메탈 prod 재사용 가능"
  container:
    dev: "docker compose up"

environments:
  local:   { db: sqlite,   compose: false, notes: "빠른 반복, 외부 의존 최소" }
  dev:     { db: postgres, compose: true,  notes: "공유 개발 DB + redis" }
  staging: { db: postgres, compose: true,  notes: "prod 동등 구성으로 검증" }
  prod:    { db: postgres, compose: false, notes: "K8s + Helm, GitOps 배포" }

scaffold:
  tree:
    - "apps/web/"
    - "apps/api/"
    - "packages/shared/"
    - "docker/"
    - ".github/workflows/"
  files:
    - "Makefile"
    - "ecosystem.config.cjs"   # PM2 (local 멀티프로세스)
    - "docker-compose.yml"
    - "pnpm-workspace.yaml"
    - "apps/web/package.json"
    - "apps/api/package.json"
    - ".env.local"
    - ".env.dev"
    - ".github/workflows/ci.yml"

testing:
  framework: "Vitest (unit) + Playwright (e2e)"   # 시험 러너 / test runner
  dir: "test/"                                     # test-runner 표준 / convention
  dev_env: "test/dev-env/"                         # 표준 환경 검증 1회 / env verification, once
  impl: "test/impl/<Nth>/"                         # 구현마다 / per implementation iteration
  cycle: "시나리오→진행→오류시 수정·재시험→결과작성 / scenario→run→fix&retest→result"

makefile_targets:
  dev: "compose up (postgres+redis) 후 pnpm dev"
  test: "pnpm -r test (Vitest) + playwright"
  build: "docker build (web, api)"
  deploy: "helm upgrade / argocd sync"

references:
  - "원본 §1 Frontend 표준 OSS, §2 Backend(Node/NestJS), §5 공통 스키마 backend.default-node"
