id: python-fastapi
title: "Python (FastAPI)"
status: stable
summary: >
  타입힌트 기반 FastAPI. uv 로 패키지/가상환경 관리, uvicorn 으로 구동. 데이터/ML/분석 API 표준.
when_to_use:
  - "데이터/ML/통계/ETL 분석 API"
  - "빠른 개발 + 자동 OpenAPI 문서가 중요할 때"
  - "Python 생태계(numpy/pandas/torch) 결합이 필요할 때"
avoid_when:
  - "프론트와 언어 공유가 우선 → node-next-nest"
  - "초저지연 코어 서비스 → go-gin / rust-axum"

languages:
  primary: python
  also: []

package_managers:
  default: uv
  allowed: [uv, pip]
  notes: "uv 1순위(빠른 resolver + venv). 레거시/제약 환경만 pip. requirements 대신 pyproject.toml + uv.lock."

layers:
  frontend: null
  backend:
    framework: "FastAPI"
    server: "uvicorn (dev) / gunicorn+uvicorn-worker (prod)"
    orm: "SQLAlchemy 2.x + Alembic"
    validation: "Pydantic v2"
  database:
    default: postgres
    local: sqlite
    cache: redis
  ops:
    ci: "GitHub Actions (or GitLab CI)"
    container: "Docker + Docker Compose"
    deploy: "Kubernetes + Helm + Argo CD"
    quality: "ruff + pytest + SonarQube"
  app: null

run_methods:
  direct:
    dev: "uv run uvicorn app.main:app --reload"
    start: "uv run gunicorn app.main:app -k uvicorn.workers.UvicornWorker"
    local_pm: "honcho (Procfile.dev, dev 의존성) — make run/ps. web+worker 통합로그, Ctrl-C 종료"
  container:
    dev: "docker compose up"

environments:
  local:   { db: sqlite,   compose: false, notes: "uv venv + sqlite, --reload" }
  dev:     { db: postgres, compose: true,  notes: "compose: postgres+redis" }
  staging: { db: postgres, compose: true,  notes: "prod 동등, gunicorn 워커" }
  prod:    { db: postgres, compose: false, notes: "K8s + Helm" }

scaffold:
  tree:
    - "app/"
    - "app/api/"
    - "app/core/"
    - "app/models/"
    - "tests/"
    - "docker/"
    - ".github/workflows/"
  files:
    - "Makefile"
    - "Procfile.dev"           # honcho (local 멀티프로세스)
    - "docker-compose.yml"
    - "pyproject.toml"
    - "app/main.py"
    - "app/core/config.py"
    - ".env.local"
    - ".env.dev"
    - ".github/workflows/ci.yml"

testing:
  framework: "pytest (+ httpx for API)"            # 시험 러너 / test runner
  dir: "test/"                                     # test-runner 표준 / convention
  dev_env: "test/dev-env/"                         # 표준 환경 검증 1회 / env verification, once
  impl: "test/impl/<Nth>/"                         # 구현마다 / per implementation iteration
  cycle: "시나리오→진행→오류시 수정·재시험→결과작성 / scenario→run→fix&retest→result"

makefile_targets:
  dev: "uv sync && uv run uvicorn --reload (또는 compose up)"
  test: "uv run pytest"
  build: "docker build"
  deploy: "helm upgrade / argocd sync"

references:
  - "원본 §2 Backend(FastAPI), §4 기술스택표준(분석 API: FastAPI/uv/uvicorn), §5 backend.default-python"
