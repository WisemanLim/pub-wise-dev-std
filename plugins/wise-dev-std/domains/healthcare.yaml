id: healthcare
title: "보건·의료·디지털헬스 (Healthcare)"
status: stable
ksic_section: Q
ksic_divisions: [86, 87, 88]
classification:
  isic: Q
  nace: Q
  naics: "62"
summary: >
  병원/의원·EMR/EHR·원격의료·디지털헬스·의료기기 SW(SaMD). 건강정보=민감정보로 동의·암호화·감사가
  설계 1일차 전제. 표준은 FHIR R4 베이스라인 + SMART on FHIR. 비프로드에 실 PHI 금지(합성/비식별만).
  연구용 RAG 결합은 bio-rag-research 프로파일과 함께 사용.

keywords:
  - 의료 / healthcare / medical / EMR / EHR
  - 병원 / hospital / clinic / 진료
  - 디지털헬스 / digital health / telemedicine / 원격의료
  - 의료기기 / SaMD / medical device software
  - FHIR / HL7 / DICOM / 건강정보

recommended_profiles:
  - { id: python-fastapi, why: "임상 ML/NLP, 비식별 파이프라인, 분석 API" }
  - { id: bio-rag-research, why: "임상문헌/SOP RAG + 보안·감사·재현성(연구조직)" }
  - { id: node-next-nest, why: "환자포털/Medplum(FHIR-native), 동의·권한 BFF" }
  - { id: go-gin,         why: "고처리량 상호운용 게이트웨이" }

stack_overrides:
  interop:    "HL7 FHIR R4(베이스), CDA(진료정보교류표준 고시), HL7 v2 어댑터, IHE(XDS/PIX/ATNA)"
  fhir_server: "HAPI FHIR(Java/Spring) 또는 Medplum(Node/React)"
  terminology: "SNOMED CT, LOINC, ICD-10-KM/ICD-11, KCD — Ontoserver/Snowstorm"
  imaging:    "DICOM/DICOMweb(WADO-RS/QIDO-RS/STOW-RS), Orthanc/OHIF, PyDICOM/MONAI"
  database:   "PostgreSQL(+pgvector), OMOP CDM(관찰연구)"
  auth:       "SMART on FHIR (OAuth2/OIDC scopes), bulk $export"
  cloud:      "CSAP 인증 클라우드 한정, ISMS-P + ISO 27017/27018, 데이터 레지던시"

korea_regulations:
  - { name: "개인정보보호법(PIPA) 민감정보(§23)", impact: "건강정보 별도동의 + 필드레벨 암호화" }
  - { name: "PIPA 가명정보 특례", impact: "연구·AI 학습 가명처리, 결합은 결합전문기관 경유, 재식별 경로 금지" }
  - { name: "보건의료데이터 활용 가이드라인", since: "2024-12", impact: "비정형(영상·텍스트)·유전체 가명처리 방법·책임범위" }
  - { name: "의료법(§21·22·23)", impact: "EMR 작성·보존, 외부보관 시설요건, 진료정보 누설금지 → 변조방지 저장·감사" }
  - { name: "진료정보교류표준(HL7 CDA 고시)", impact: "CDA R2 템플릿 export/import 구현" }
  - { name: "마이헬스웨이/건강정보 고속도로", impact: "FHIR 기반 표준 API + 동의 연동, 테스트베드 사전검증" }
  - { name: "EMR 인증제(보건의료정보원)", impact: "기능성·상호운용성·보안 3영역, 기관규모별 1/2/3유형" }
  - { name: "의료기기 SW/SaMD(식약처)", since: "2025", impact: "IEC 62304 준수 + 사용적합성 + 사이버보안(SBOM) 인허가" }
  - { name: "클라우드 의료정보(병원정보시스템 보안 가이드 2025)", impact: "CSAP 클라우드, 6영역 보안모델" }
  - { name: "생명윤리법", impact: "인체유래물·유전정보 연구 IRB 승인 게이트" }

global_compliance:
  - "HIPAA (PHI, US 환자/오프쇼어 벤더)"
  - "GDPR Art.9 (건강=특수범주, DPIA, 레지던시)"
  - "HL7 FHIR R4(베이스)/R5, HL7 v2/CDA, DICOM, IHE(XDS/PIX/ATNA)"
  - "ISO 13485 + IEC 62304(SaMD SW 수명주기, class A/B/C), ISO 14971, IEC 62366"
  - "SOC 2 Type II"

data_classes:
  - { name: "PHI/의료정보", level: "규제대상", note: "의료법 보존·누설금지, 실 PHI 비프로드 금지" }
  - { name: "민감정보(건강)", level: "규제대상", note: "PIPA §23 별도동의+암호화" }
  - { name: "유전정보/인체유래물", level: "규제대상", note: "생명윤리법, IRB 게이트" }
  - { name: "가명정보", level: "제한", note: "재식별 금지, 결합전문기관 경유" }
  - { name: "익명정보", level: "공개가능", note: "익명화 기준 충족 시 PIPA 밖" }

infra_patterns:
  - "비식별 파이프라인: 정형+비정형(영상/텍스트 마스킹·OCR redaction)+유전체, 가명키 금고 격리"
  - "동의관리: 세분·철회가능·시한부 동의원장, SMART on FHIR scope, 마이헬스웨이 연동"
  - "FHIR 상호운용 계층(HAPI/Medplum) + CDA↔FHIR 매핑 + HL7 v2 어댑터"
  - "불변 감사추적(ATNA), RBAC/ABAC, break-glass 로깅"
  - "용어 서비스(SNOMED/LOINC/ICD/KCD) 중앙화 + value-set 검증"
  - "CSAP 클라우드·온프렘/프라이빗, 6영역 네트워크 분리, 필드레벨 암호화"

dev_env_special:
  - "비프로드 실 PHI 금지 — Synthea 합성/비식별 데이터만"
  - "SaMD: IEC 62304 SW 수명주기 문서 + 요구사항-시험 추적행렬(DHF)"
  - "ISO 14971 위험관리파일 + IEC 62366 사용적합성 파일 연계"
  - "통제된 릴리스/서명 빌드/감사가능 CI/CD + 사이버보안 SBOM"
  - "프로드 데이터 접근은 IRB/동의 게이트"

testing_additions:
  - "FHIR 적합성: 리소스 validate + SMART on FHIR scope 강제"
  - "비식별 검증: 산출물에 직접식별자 없음(재식별 불가)"
  - "CDA R2 export/import 라운드트립 일치"
  - "감사로그: 조회·다운로드·break-glass 기록"

