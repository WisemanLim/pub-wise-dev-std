  messaging:  "MQTT/Kafka (안전 센서·웨어러블 텔레메트리)"
  files:      "IFC/BCF 파서, 대용량 업로드(멀티파트/재개)"
  observability: "현장 디바이스/센서 상태 모니터링"

korea_regulations:
