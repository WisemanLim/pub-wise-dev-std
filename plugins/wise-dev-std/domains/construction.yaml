summary: >
  건설사업관리·BIM·현장안전. 대용량 BIM/도면(IFC) 처리, 공정·원가 관리, 현장 안전(중대재해)
  모니터링이 핵심. 옥외/지하 현장의 모바일·오프라인과 IoT 안전 센서 연동.

keywords:
  - 건설 / construction / contech
