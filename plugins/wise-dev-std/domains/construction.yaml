  - 현장안전 / safety / 중대재해 / 공정관리
  - 시공 / 감리 / 적산 / 원가 / estimating

recommended_profiles:
  - { id: node-next-nest, why: "사업관리/공정·원가 포털, BIM 뷰어 BFF" }
  - { id: python-fastapi, why: "BIM/IFC 파싱·물량 산출, 안전 영상분석 ML" }
  - { id: react-native-app, why: "현장 점검/안전보고 모바일(오프라인)" }
  - { id: go-gin,         why: "대용량 도면/파일 처리·IoT 센서 수집" }

stack_overrides:
