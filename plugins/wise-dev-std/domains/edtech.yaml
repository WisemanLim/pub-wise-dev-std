id: edtech
title: "교육·에듀테크 (Education / Edtech)"
status: stable
ksic_section: P
ksic_divisions: [85]
classification:
  isic: P
  nace: P
  naics: "61"
summary: >
  교육/에듀테크/LMS/라이브클래스. 미성년자(만 14세 미만) 보호자 동의가 1순위 제약,
  실시간 영상(WebRTC/HLS) + 등록·시험 트래픽 버스트가 기술 핵심. (SW 활동은 J 로 이중분류 잦음)

keywords:
  - 교육 / education / edtech / 학습 / learning
  - LMS / 강의 / class / 온라인교육
  - 학원 / 학교 / 미성년자 / 라이브클래스

recommended_profiles:
  - { id: node-next-nest, why: "실시간(WebSocket/WebRTC) 라이브클래스 + 포털" }
  - { id: python-fastapi, why: "추천·학습분석 ML, 콘텐츠 파이프라인" }

stack_overrides:
  realtime:   "WebRTC(라이브영상/화이트보드/브레이크아웃) + WebSocket(채팅/퀴즈) + HLS(일대다 방송)"
  media:      "영상 트랜스코드 + CDN, WebRTC SFU/미디어서버"
  lms:        "SCORM/xAPI/LTI 상호운용"
  data:       "PostgreSQL + Redis(세션/상태)"

korea_regulations:
  - { name: "개인정보보호법(PIPA)", impact: "PII 수명주기(동의·최소·보유·삭제), 과징금 매출 3%" }
  - { name: "아동·청소년 개인정보(만14세 미만, PIPA §22-2)", impact: "보호자 동의 게이트 + 본인/보호자 인증, 미성년자 정보 마스킹" }
  - { name: "교육 관련 개인정보(학습기록)", impact: "민감 취급, 벤더 공유 제한, 학습기록 조회 감사로그" }
  - { name: "웹접근성(KWCAG)", impact: "교육콘텐츠 접근성 + a11y CI" }

global_compliance:
  - "COPPA (만13세 미만, 2025-06-23 개정/2026-04-22 완전준수, 제3자 공유 전 부모동의)"
  - "FERPA (US 학생기록)"
  - "GDPR (디지털 동의연령 13~16, DPIA)"

data_classes:
  - { name: "학습자 PII", level: "민감", note: "이름/연락처/학적" }
  - { name: "미성년자 정보", level: "규제대상", note: "보호자 동의 연동(만14세 미만)" }
  - { name: "학습기록/성취도", level: "민감", note: "교육 민감기록" }
  - { name: "결제(보호자)", level: "규제대상", note: "PG" }

infra_patterns:
  - "영상 트랜스코드 + CDN, WebRTC SFU/미디어서버"
  - "버스트 스케일 백엔드(10x 스파이크 — 월요일 로그인·시험기간)"
  - "Redis 세션 스토어, 저지연 멀티리전 영상"

dev_env_special:
  - "비프로드 미성년자 데이터 마스킹"
  - "COPPA/PIPA-safe 합성 테스트데이터(CI에 실제 미성년 PII 금지)"
  - "보호자 동의 플로우 테스트 픽스처, a11y CI 게이트(KWCAG/WCAG)"
  - "등록/시험 버스트 부하 테스트"

testing_additions:
  - "만14세 미만 가입 시 보호자 동의 없으면 차단"
  - "미성년자 PII 비프로드 마스킹 검증"
  - "라이브클래스 동시접속 부하 + 영상 지연"

references:
  - "https://easylaw.go.kr/CSP/CnpClsMain.laf?popMenu=ov&csmSeq=659 (만14세미만 보호자동의)"
  - "https://casenote.kr/법령/개인정보_보호법/제22조의2 (PIPA §22-2)"
  - "https://complydog.com/blog/edtech-saas-compliance-student-privacy-gdpr-implementation (COPPA 2025/2026)"
  - "https://www.100ms.live/blog/live-classroom-webrtc-hls"
  - "https://wearebrain.com/blog/best-tech-stack-edtech-2026/"
